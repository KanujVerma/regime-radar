app:
  env: development
  log_level: INFO

paths:
  data_raw: data/raw
  data_processed: data/processed
  data_models: data/models
  data_fixtures: data/fixtures
  data_db: data/app.db

provider:
  # Price-card provider for the Current State dashboard.
  # "auto" = FinnhubProvider if FINNHUB_API_KEY is set (optional live price overlay),
  # else MockProvider (DEMO mode, no network calls).
  # Historical OHLCV always comes from yfinance; FRED supplies VIX + EMV.
  # Finnhub is NEVER required for feature generation, labeling, training, or inference.
  mode: auto

scheduler:
  refresh_interval_minutes: 5
  market_open: "09:30"
  market_close: "16:00"
  timezone: "America/New_York"
  enabled: true
