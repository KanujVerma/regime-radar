services:
  - type: web
    name: regime-radar-api
    runtime: docker
    dockerfilePath: Dockerfile.api
    plan: free
    healthCheckPath: /health
    filter:
      paths:
        - src/**
        - data/**
        - requirements.txt
        - Dockerfile.api
        - render.yaml
    envVars:
      - key: FRED_API_KEY
        sync: false
      - key: APP_ENV
        value: production
      - key: FINNHUB_API_KEY
        sync: false
