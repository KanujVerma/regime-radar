name: CI

on:
  push:
    branches: [main, phase1-trust-fixes]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        # The lockfile is generated on macOS and omits Linux-specific optional native
        # bindings for @tailwindcss/oxide. Deleting it before npm install forces a
        # fresh resolve that picks up the correct Linux binary.
        run: rm -f package-lock.json && npm install

      - name: Build (typecheck + bundle)
        working-directory: frontend
        run: npm run build
